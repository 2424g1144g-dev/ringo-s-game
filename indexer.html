<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学級裁判所 - Final Version</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; background: radial-gradient(circle, #222 0%, #000 100%);
            z-index: 10; transition: opacity 1s ease;
        }
        .instruction { 
            font-size: 28px; letter-spacing: 8px; border: 3px solid #fff; 
            padding: 20px 40px; text-shadow: 0 0 10px #fff;
            animation: blink 2s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="instruction">PRESS ENTER TO START</div>
        <p style="margin-top: 20px;">学級裁判を開廷しますか？</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, mmdMesh;
        let isStarted = false;
        const characters = {
            ryujiNormal: "characters/RYUJI/Ryuji_Normal.png",
            kentoNormal: "characters/KENTO/Kento_Normal.png",
            taturoNormal: "characters/TATURO/TATURO_normal.png",
            taturoConsider: "characters/TATURO/Taturo_Consider.png",
            mitsuhiroNormal: "characters/MITSUHIRO/Mitsuhiro_Normal.png",
            fakeFuruichiNormal: "characters/FAKEFURUICHI/FakeFuruichi_Normal.png",
            keizoNormal: "characters/KEIZO/Keizo_Normal.png",
            shigeNormal: "characters/SHIGE/Shige_Normal.png",
            yudaiNormal: "characters/YUDAI/Yudai_Normal.png"
        };

        // --- 1. 初期設定 ---
        function initThree() {
            scene = new THREE.Scene();
            // 霧（Fog）を追加して奥行きと雰囲気を出す
            scene.fog = new THREE.Fog(0x000000, 100, 1000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 40, 120);

            renderer = new THREE.WebGLRenderer({ antialias: true }); // バッテリー優先ならfalse
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // 重要：色空間の設定（白っぽさを防ぐ）
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            
            // バッテリー対策：解像度を制限
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            document.body.appendChild(renderer.domElement);

            // ライト設定（MMDモデル向けに強めに設定）
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 操作設定
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // 滑らかな動き

            // バッテリー対策：変化がある時だけ描画（アニメーションさせない場合）
            // controls.addEventListener('change', () => renderer.render(scene, camera));
        }

        // --- 2. モデル読み込みと色味補正 ---
        function loadCourtroom() {
            const loader = new MMDLoader();
            const pmxPath = 'thr/circleTrial/trial.pmx'; // あなたのファイル名

            loader.load(pmxPath, (mesh) => {
                mmdMesh = mesh;
                
                mesh.traverse((child) => {
                if (child.isMesh) {
                    // マテリアルが配列（複数）の場合と単体の場合の両方に対応させる
                    const materials = Array.isArray(child.material) ? child.material : [child.material];
                    materials.forEach((mat) => {
                        // 1. emissiveが存在するかチェックしてから実行
                        if (mat.emissive && typeof mat.emissive.setHex === 'function') {
                            mat.emissive.setHex(0x000000);
                        }
                        // 2. テクスチャの色空間設定
                        if (mat.map) {
                            mat.map.colorSpace = THREE.SRGBColorSpace;
                            mat.map.needsUpdate = true; // 反映を確実にする
                        }
                        // 3. 白っぽさを抑えるための「鏡面反射」リセット
                        if (mat.specular && typeof mat.specular.setHex === 'function') {
                            mat.specular.setHex(0x111111); // ギラつきを抑える暗いグレー
                        }
                        mat.transparent = false;
                    });
                }
            });
                scene.add(mmdMesh);
                spawnStandIn(characters.ryujiNormal,{x: 0, y: 14, z: -30}, 0,  25,25); // ここで呼び出す！
                spawnStandIn(characters.kentoNormal,{x: 22, y: 14, z: -20},-45, 25,25);
                spawnStandIn(characters.taturoConsider,{x: 30, y: 14, z: 0}, -90, 25,25);
                spawnStandIn(characters.mitsuhiroNormal,{x: 22, y: 14, z: 20}, -135, 25,25);
                spawnStandIn(characters.fakeFuruichiNormal,{x: 0, y: 14, z: 30}, 180, 25,25);
                spawnStandIn(characters.keizoNormal,{x: -22, y: 14, z: 20}, 135, 25,25);
                spawnStandIn(characters.shigeNormal,{x: -30, y: 14, z: 0}, 90, 25,25);
                spawnStandIn(characters.yudaiNormal,{x: -22, y: 14, z: -20}, 45, 25,25)

                // 演出：オーバーレイを消す
                const overlay = document.getElementById('overlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 1000);

            }, (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                console.log(`Loading: ${percent}%`);
            }, (err) => {
                console.error("エラー発生:", err);
            });
        }

        // --- 3. ループ ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Dampingを有効にするため
            renderer.render(scene, camera);
        }

        // --- イベント ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isStarted) {
                isStarted = true;
                initThree();
                loadCourtroom();
                animate();
            }
        });

        window.addEventListener('resize', () => {
            if (!renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    /*
    * 4. 角度指定も可能なキャラクター配置
    */
    function spawnStandIn(imagePath, position = { x: 0, y: 15, z: 45 }, rotationY = 0, width, height) {
        const loader = new THREE.TextureLoader();
        loader.load(imagePath, (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            const geometry = new THREE.PlaneGeometry(width, height); 

            // 表面
            const material = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                side: THREE.FrontSide,
                alphaTest: 0.5 
            });
            const standIn = new THREE.Mesh(geometry, material);
        
            // --- 位置と角度を設定 ---
            standIn.position.set(position.x, position.y, position.z);
            standIn.rotation.y = rotationY*(Math.PI / 180); // ここで角度を適用！

            // 背面（裏側）
            const backMaterial = new THREE.MeshBasicMaterial({ 
                map: texture,
                color: 0x000000,
                transparent: true,
                side: THREE.BackSide,
                alphaTest: 0.5 
            });
            const backPlate = new THREE.Mesh(geometry, backMaterial);
            standIn.add(backPlate); 

            scene.add(standIn);
        });
    }
    </script>
</body>
</html>
